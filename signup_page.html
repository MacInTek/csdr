    <!-- PWA Install Button -->
    <button id="pwa-install-btn" title="Install App" style="
      display:none; position:fixed; top:12px; right:12px; z-index:9999;
      background:#0c6d38; color:white; border:none; border-radius:8px;
      padding:7px 12px; font-size:12px; font-weight:600; cursor:pointer;
      box-shadow:0 2px 8px rgba(0,0,0,0.2); align-items:center; gap:6px;">
      Install
    </button>
    <script>
      let _dp;
      window.addEventListener("beforeinstallprompt", e => {
        e.preventDefault(); _dp = e;
        const btn = document.getElementById("pwa-install-btn");
        btn.style.display = "flex";
      });
      document.getElementById("pwa-install-btn").addEventListener("click", async () => {
        if (!_dp) return;
        _dp.prompt();
        const { outcome } = await _dp.userChoice;
        if (outcome === "accepted") document.getElementById("pwa-install-btn").style.display = "none";
        _dp = null;
      });
      window.addEventListener("appinstalled", () => {
        document.getElementById("pwa-install-btn").style.display = "none";
      });
    </script>
